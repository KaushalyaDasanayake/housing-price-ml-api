name: Weekly Retraining

on:
  schedule:
    - cron: "0 3 * * 0"   # Every Sunday 03:00 UTC
  workflow_dispatch:       # Allows manual run from GitHub UI

jobs:
  retrain:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run retraining script
        run: |
          python scripts/retrain.py

      - name: Commit updated model artifacts
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add model/model.joblib model/scaler.joblib model/training_stats.json

          # Commit only if there are changes
          git diff --cached --quiet || git commit -m "Weekly model retrain"

          git push